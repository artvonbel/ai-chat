<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бот-Бриф для ТЗ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    body {
      background: #0f0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .chat-container {
      width: 700px;
      max-width: 96%;
      background: #1e1e2f;
      border-radius: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 80vh;
    }
    .header {
      background: #2a2a40;
      padding: 20px 28px;
      border-bottom: 1px solid #3b3b5a;
    }
    .header h2 {
      color: #fff;
      font-weight: 600;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h2 span {
      background: #4f46e5;
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 40px;
      color: #fff;
    }
    .messages {
      flex: 1;
      padding: 20px 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #181825;
    }
    .message {
      max-width: 80%;
      padding: 14px 20px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      background: #4f46e5;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message.bot {
      background: #2d2d44;
      color: #e4e4f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      white-space: pre-wrap;
    }
    .input-area {
      background: #1e1e2f;
      padding: 16px 28px 20px;
      border-top: 1px solid #2d2d44;
      display: flex;
      gap: 12px;
    }
    .input-area input {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 40px;
      background: #2d2d44;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }
    .input-area input::placeholder {
      color: #8888aa;
    }
    .input-area input:focus {
      background: #3b3b5a;
    }
    .input-area button {
      padding: 14px 30px;
      border: none;
      border-radius: 40px;
      background: #4f46e5;
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .input-area button:hover {
      background: #6366f1;
      transform: scale(1.02);
    }
    .input-area button:disabled {
      opacity: 0.5;
      pointer-events: none;
    }
    .typing {
      color: #8888aa;
      font-size: 0.9rem;
      padding: 6px 0 10px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .typing::after {
      content: '...';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      33% { content: '.'; }
      66% { content: '..'; }
      100% { content: '...'; }
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <h2>🧠 Бот-Бриф <span>ТЗ за 2 минуты</span></h2>
    </div>
    <div class="messages" id="messages">
      <div class="message bot">
        Привет! 👋 Я помогу тебе составить чёткое техническое задание для твоего проекта. <br/>
        Расскажи, что ты хочешь сделать, и я задам тебе нужные вопросы.
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="input" placeholder="Напиши, что тебе нужно..." />
      <button id="sendBtn">Отправить</button>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const messages = document.getElementById('messages');
    let controller = null; // для отмены запроса

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message bot typing';
      div.id = 'typingIndicator';
      div.textContent = 'Бот печатает';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      sendBtn.disabled = true;
      showTyping();

      // Отменяем предыдущий запрос, если был
      if (controller) controller.abort();
      controller = new AbortController();

      try {
        const timeout = setTimeout(() => controller.abort(), 60000); // 60 секунд

        const response = await fetch('http://localhost:5000/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: text }),
          signal: controller.signal,
        });

        clearTimeout(timeout);
        removeTyping();

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Ошибка сервера');
        }

        const data = await response.json();
        if (data.answer) {
          addMessage(data.answer, 'bot');
        } else {
          addMessage('❌ Пустой ответ от сервера.', 'bot');
        }
      } catch (error) {
        removeTyping();
        if (error.name === 'AbortError') {
          addMessage('⏳ Превышено время ожидания. Попробуйте еще раз.', 'bot');
        } else {
          addMessage('❌ Ошибка: ' + error.message, 'bot');
        }
        console.error(error);
      } finally {
        sendBtn.disabled = false;
        controller = null;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
